name: voices-kg-v2

# Production overlay used on a VM where host nginx terminates TLS and
# proxies the public hostname to the Streamlit + admin containers via the
# loopback. Caddy is disabled (nginx handles routing + TLS), and ports
# bind to 127.0.0.1 only so nothing in this stack is reachable from
# the public internet directly.
#
# All services get NO_PROXY=localhost,127.0.0.1 so any corporate HTTP
# proxy is bypassed for loopback healthchecks.

x-no-proxy: &no_proxy
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  NO_PROXY: "localhost,127.0.0.1,::1,fuseki,meilisearch,redis,admin,app"
  no_proxy: "localhost,127.0.0.1,::1,fuseki,meilisearch,redis,admin,app"

services:

  fuseki:
    # FUSEKI_HOST_PORT in .env is set to "127.0.0.1:3032" so the base
    # compose's "${FUSEKI_HOST_PORT}:3030" expands to a loopback-only
    # binding, reachable from the host load script but not from the
    # public network.
    environment:
      <<: *no_proxy
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-voices2026}
      FUSEKI_DATASET_1: voices
      JVM_ARGS: ${FUSEKI_JVM_ARGS:--Xmx3g -Xms1g}

  meilisearch:
    environment:
      <<: *no_proxy
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-voices-meili-master-key}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"

  redis:
    environment:
      <<: *no_proxy

  admin:
    ports:
      - "127.0.0.1:8000:8000"
    # Add the scripts directory so we can `exec admin python /scripts/...`
    # for the one-off Meilisearch indexing + cache precompute tasks.
    volumes:
      - ./admin:/app/admin:ro
      - admin-db:/data
      # /output is RW for the admin container so precompute_caches.py can
      # regenerate the JSON caches in /output/caches. The app container
      # still mounts /output read-only.
      - ./output:/output
      - ./scripts:/scripts:ro
      - ./schema:/schema:ro
    environment:
      <<: *no_proxy
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DATABASE_URL: sqlite:////data/voices.db
      REDIS_URL: redis://redis:6379/0
      FUSEKI_URL: http://fuseki:3030/voices
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-voices-meili-master-key}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@voices.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-voices-admin-2026}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://voices.example.org}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}

  app:
    ports:
      - "127.0.0.1:8501:8501"
    # Skip Streamlit's filesystem polling and disable browser-side telemetry
    # for a faster cold start after login.
    command:
      - "streamlit"
      - "run"
      - "/app/Overview.py"
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
      - "--server.fileWatcherType=none"
      - "--browser.gatherUsageStats=false"
    environment:
      <<: *no_proxy
      FUSEKI_URL: http://fuseki:3030/voices
      REDIS_URL: redis://redis:6379/1
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-voices-meili-master-key}
      ADMIN_URL: http://admin:8000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://voices.example.org}
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHERUSAGESTATS: "false"
      STREAMLIT_SERVER_ENABLECORS: "false"
      STREAMLIT_SERVER_ENABLEXSRFPROTECTION: "false"
      STREAMLIT_SERVER_BASEURLPATH: ""

  caddy:
    profiles: ["disabled"]
    ports: !reset []
