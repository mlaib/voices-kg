# ---------------------------------------------------------------------------
# Build & publish the VOICES ontology documentation to GitLab Pages.
#
#   * WIDOCO  -> human-readable HTML documentation (public/index.html)
#   * OOPS!   -> ontology pitfall report           (public/oops.html)
#
# WIDOCO's own `-oops` flag is intentionally NOT used: it sends the ontology with
# its (local) owl:imports to the OOPS! service, which cannot resolve them and then
# returns a misleading "no pitfalls" all-clear. scripts/oops-check.py runs a
# reliable, VOICES-scoped evaluation instead.
#
# Imports resolve offline via schema/catalog-v001.xml (honoured by WIDOCO/OWL API).
# ---------------------------------------------------------------------------
stages:
  - docs

variables:
  WIDOCO_VERSION: "1.4.25"
  ONTOLOGY: "schema/voices_ontology_v2.ttl"

pages:
  stage: docs
  image: eclipse-temurin:17-jdk
  before_script:
    - apt-get update -y
    - apt-get install -y --no-install-recommends curl ca-certificates python3 python3-rdflib
  script:
    # --- 1. WIDOCO documentation -> public/ ---------------------------------
    - >
      curl -fL -o widoco.jar
      "https://github.com/dgarijo/Widoco/releases/download/v${WIDOCO_VERSION}/widoco-${WIDOCO_VERSION}-jar-with-dependencies_JDK-17.jar"
    - >
      java -jar widoco.jar
      -ontFile "$ONTOLOGY"
      -outFolder public
      -webVowl
      -rewriteAll
      -includeAnnotationProperties
      -getOntologyMetadata
      -uniteSections
      -lang en
      -noPlaceHolderText
    # GitLab Pages serves public/index.html; WIDOCO names the entry index-en.html
    - '[ -f public/index.html ] || cp public/index-en.html public/index.html'
    # --- 2. OOPS! pitfall report -> public/oops.html ------------------------
    # Non-blocking: the script always exits 0 (external service may be down).
    - python3 scripts/oops-check.py "$ONTOLOGY" public/oops.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
