<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change password — VOICES</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white border border-slate-200 rounded-lg shadow-sm p-8">
    <h1 class="text-xl font-semibold text-slate-900 mb-1">Change password</h1>
    <p class="text-sm text-slate-500 mb-6">Signed in as <code class="text-slate-700">{{ user_email }}</code></p>

    {% if error %}
      <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-sm text-red-700">
        {{ error }}
      </div>
    {% endif %}

    {% if success %}
      <div class="mb-4 p-3 rounded bg-emerald-50 border border-emerald-200 text-sm text-emerald-700">
        {{ success }}
      </div>
    {% endif %}

    <form method="post" action="/auth/password" class="space-y-4">
      <div>
        <label for="current_password" class="block text-sm font-medium text-slate-700 mb-1">Current password</label>
        <input id="current_password" name="current_password" type="password" required autofocus
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
      <div>
        <label for="new_password" class="block text-sm font-medium text-slate-700 mb-1">New password</label>
        <input id="new_password" name="new_password" type="password" required minlength="8"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
        <p class="text-xs text-slate-500 mt-1">At least 8 characters.</p>
      </div>
      <div>
        <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-1">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
      <button type="submit"
              class="w-full bg-slate-900 text-white rounded-md py-2 text-sm font-medium hover:bg-slate-800">
        Update password
      </button>
    </form>

    <p class="mt-6 text-xs text-slate-400 text-center">
      <a href="/" class="hover:text-slate-600">Back to explorer</a>
    </p>
  </div>
</body>
</html>
